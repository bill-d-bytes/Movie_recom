<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CineMatch - {% if mode == 'register' %}Sign Up{% else %}Sign In{% endif %}</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#a00216",
                        "on-primary-fixed-variant": "#930007",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#004689",
                        "on-background": "#e5e2e1",
                        "secondary-fixed": "#ffdad7",
                        "tertiary-fixed": "#d5e3ff",
                        "surface-container": "#201f1f",
                        "primary-container": "#e50914",
                        "on-tertiary-fixed": "#001b3c",
                        "on-primary-fixed": "#410001",
                        "background": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-container": "#0072d7",
                        "outline": "#af8782",
                        "on-secondary-container": "#ffa9a2",
                        "surface-container-highest": "#353534",
                        "primary": "#ffb4aa",
                        "surface-bright": "#3a3939",
                        "on-primary": "#690003",
                        "inverse-on-surface": "#313030",
                        "on-surface": "#e5e2e1",
                        "surface-variant": "#353534",
                        "tertiary-fixed-dim": "#a7c8ff",
                        "on-surface-variant": "#e9bcb6",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "tertiary": "#a7c8ff",
                        "surface-dim": "#131313",
                        "primary-fixed": "#ffdad5",
                        "on-secondary-fixed-variant": "#930012",
                        "on-error": "#690005",
                        "on-tertiary": "#003061",
                        "inverse-primary": "#c0000c",
                        "surface": "#131313",
                        "on-secondary": "#68000a",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary-container": "#f8f9ff",
                        "primary-fixed-dim": "#ffb4aa",
                        "secondary": "#ffb3ad",
                        "inverse-surface": "#e5e2e1",
                        "on-primary-container": "#fff7f6",
                        "outline-variant": "#5e3f3b",
                        "surface-tint": "#ffb4aa",
                        "secondary-fixed-dim": "#ffb3ad",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary-fixed": "#410004"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "40px",
                        "lg": "24px",
                        "unit": "4px",
                        "md": "16px",
                        "sm": "8px",
                        "xxl": "64px",
                        "container-max": "1440px",
                        "xs": "4px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"],
                        "label-bold": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md antialiased selection:bg-primary-container selection:text-white">
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-br from-background via-background/95 to-surface-container/90 z-10"></div>
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/3 z-10"></div>
<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px] translate-y-1/3 -translate-x-1/3 z-10"></div>
</div>
<main class="w-full max-w-[440px] px-md relative z-20">
<div class="bg-surface-container/60 backdrop-blur-2xl border border-surface-variant/50 rounded-xl p-xl shadow-[0_8px_32px_rgba(0,0,0,0.6)]">
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg font-black tracking-tighter text-primary-container uppercase">CineMatch</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">
{% if mode == 'register' %}Create your account.{% else %}Enter the lobby.{% endif %}
                </p>
</div>
<div id="auth-error" class="hidden mb-lg bg-error-container/20 border border-error/40 rounded-lg px-md py-sm text-error font-label-bold text-label-bold text-center"></div>

{% if mode == 'register' %}
<form id="register-form" class="space-y-lg" action="#" method="post">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-sm" for="reg-email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors duration-300">mail</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-[14px] pl-[48px] pr-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-300 shadow-inner" id="reg-email" name="email" type="email" placeholder="Email" required autocomplete="email"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-sm" for="reg-username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors duration-300">person</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-[14px] pl-[48px] pr-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-300 shadow-inner" id="reg-username" name="username" placeholder="Username" required autocomplete="username" type="text"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-sm" for="reg-password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors duration-300">lock</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-[14px] pl-[48px] pr-[48px] font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-300 shadow-inner" id="reg-password" name="password" placeholder="••••••••" required type="password" autocomplete="new-password"/>
<button type="button" id="reg-password-toggle" aria-label="Toggle password visibility" class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors duration-200 focus:outline-none">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary-container font-label-bold text-label-bold uppercase tracking-[0.1em] py-[16px] rounded-lg hover:bg-inverse-primary hover:shadow-[0_0_20px_rgba(229,9,20,0.4)] transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-sm" type="submit">
                        Create account
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<div class="text-center mt-xl">
<p class="font-body-md text-body-md text-on-surface-variant">Already have a ticket? <a class="font-label-bold text-label-bold text-on-surface hover:text-primary-container transition-colors" href="/">Sign In</a></p>
</div>

{% else %}
<form id="login-form" class="space-y-lg" action="#" method="post">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-sm" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors duration-300">person</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-[14px] pl-[48px] pr-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-300 shadow-inner" id="username" name="username" placeholder="Username" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-sm" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors duration-300">lock</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-[14px] pl-[48px] pr-[48px] font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-300 shadow-inner" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" id="login-password-toggle" class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors duration-200 focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-sm">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary-container transition-colors duration-200" href="#">Forgot Password?</a>
</div>
</div>
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary-container font-label-bold text-label-bold uppercase tracking-[0.1em] py-[16px] rounded-lg hover:bg-inverse-primary hover:shadow-[0_0_20px_rgba(229,9,20,0.4)] transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-sm" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<div class="relative mt-xl mb-lg">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant/60"></div>
</div>
<div class="relative flex justify-center">
<span class="px-sm bg-surface-container font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Or</span>
</div>
</div>
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">Don't have a ticket? <a class="font-label-bold text-label-bold text-on-surface hover:text-primary-container ml-xs transition-colors duration-200" href="{{ url_for('register') }}">Sign Up</a></p>
</div>
{% endif %}
</div>
</main>

<script src="/static/js/api.js"></script>
<script>
(function () {
  const errEl = document.getElementById('auth-error');
  function showErr(msg) {
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
  }
  function hideErr() { errEl.classList.add('hidden'); }

{% if mode == 'register' %}
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    hideErr();
    btn.disabled = true;
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>';

    const res = await apiFetch('/auth/register', 'POST', {
      username: document.getElementById('reg-username').value.trim(),
      email: document.getElementById('reg-email').value.trim(),
      password: document.getElementById('reg-password').value,
    });

    if (res.ok) {
      window.location.href = '/discover';
    } else {
      const data = await res.json().catch(() => ({}));
      showErr(data.error || 'Could not create account.');
      btn.disabled = false;
      btn.innerHTML = orig;
    }
  });
  document.getElementById('reg-password-toggle').addEventListener('click', function () {
    const input = document.getElementById('reg-password');
    const icon = this.querySelector('span');
    if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility'; }
    else { input.type = 'password'; icon.textContent = 'visibility_off'; }
  });
{% else %}
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    hideErr();
    btn.disabled = true;
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>';

    const res = await apiFetch('/auth/login', 'POST', {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    });

    if (res.ok) {
      window.location.href = '/discover';
    } else {
      const data = await res.json().catch(() => ({}));
      showErr(data.error || 'Login failed. Please try again.');
      btn.disabled = false;
      btn.innerHTML = orig;
    }
  });
  document.getElementById('login-password-toggle').addEventListener('click', function () {
    const input = document.getElementById('password');
    const icon = this.querySelector('span');
    if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility'; }
    else { input.type = 'password'; icon.textContent = 'visibility_off'; }
  });
{% endif %}
})();
</script>
</body></html>
